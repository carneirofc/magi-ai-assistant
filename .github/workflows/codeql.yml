name: CodeQL

# Static analysis / SAST for both languages. Findings land in the repo's Security
# tab (Code scanning); make this a required check via branch protection to block
# on new high-severity alerts.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly full scan, independent of pushes (catches newly-published advisories).
    - cron: "0 3 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
