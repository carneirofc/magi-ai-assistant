name: Release (engine + frontend)

# One-shot release of BOTH libraries in lockstep: the Python engine (to PyPI,
# plus wheel/sdist onto a GitHub Release) and the @carneirofc/magi-web frontend
# (to GitHub Packages). Bump both manifests to the same version first, then:
#   git tag release-v0.1.1 && git push origin release-v0.1.1
# The single-library workflows (publish-magi.yml / publish-magi-web.yml) still
# exist for releasing one side independently.
on:
  push:
    tags:
      - "release-v*"
  workflow_dispatch: {}

permissions:
  contents: write   # engine: create the GitHub Release + upload artifacts
  packages: write   # frontend: publish to GitHub Packages

jobs:
  engine:
    name: engine → GitHub Release (wheel + sdist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        run: uv build

      # PyPI is the pip route — GitHub Packages has no Python registry. Needs a
      # PYPI_API_TOKEN repo secret; uv reads it via UV_PUBLISH_TOKEN.
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: Publish GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the tag when triggered by one; on manual dispatch fall back to
          # the engine version so the release is still named sensibly.
          TAG="$GITHUB_REF_NAME"
          case "$TAG" in
            release-v*) ;;
            *) TAG="release-v$(grep -m1 '^version' pyproject.toml | cut -d'\"' -f2)" ;;
          esac
          gh release create "$TAG" dist/* --title "$TAG" --generate-notes \
          || gh release upload "$TAG" dist/* --clobber

  frontend:
    name: frontend → GitHub Packages (@carneirofc/magi-web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@carneirofc"

      # The workspace root links @carneirofc/ui from a sibling checkout for
      # local co-development; that path doesn't exist in CI, so repoint the
      # root dep at the registry range and drop the stale lockfile before a
      # fresh install (see publish-magi-web.yml for the same step).
      - name: Use registry @carneirofc/ui in CI
        run: |
          npm pkg set 'dependencies.@carneirofc/ui=>=0.2.0'
          rm -f package-lock.json

      - name: Install workspace
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck library
        run: npm run typecheck -w @carneirofc/magi-web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: npm publish -w @carneirofc/magi-web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
