# Example: run the magi app itself in Docker, built locally from the Dockerfile.
#
# docker-compose.yaml holds the *supporting* services (litellm, qdrant, rustfs, …);
# this file adds the app on top. The app reaches every backend — the host's
# llama-server on :8888, plus any compose service that publishes a host port — via
# host.docker.internal, exactly as the host-run app reaches localhost. So it works
# standalone or merged with the infra stack:
#
#   # just the app (needs a llama-server running on the host :8888)
#   docker compose -f docker-compose.app.yaml up --build api
#
#   # app + supporting services together
#   docker compose -f docker-compose.yaml -f docker-compose.app.yaml up --build
#
#   # the Discord bot instead of the HTTP API (needs DISCORD_BOT_TOKEN in .env)
#   docker compose -f docker-compose.app.yaml --profile discord up --build discord
#
# Bake in optional extras at build time, e.g.:  EXTRAS="--extra s3" docker compose ...

services:
  # HTTP API + OpenAI-compatible shim (main_api_docker.py → bind 0.0.0.0:8000).
  api:
    build:
      context: .
      args:
        EXTRAS: ${EXTRAS:-}
    image: magi-app:local
    container_name: magi-api
    restart: unless-stopped
    command: ["python", "main_api_docker.py"]
    ports:
      - "8000:8000"
    env_file:
      - .env                      # secrets only (API_AUTH_TOKEN, LLAMACPP_API_KEY, …)
    extra_hosts:
      - "host.docker.internal:host-gateway"   # so the container can reach host services
    volumes:
      - ./data:/app/data          # persist sqlite db, memory files, local byte archive
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Operator admin API (main_admin_docker.py → channels/admin.py). Manages memory +
  # the knowledge corpus. Reuses the app image, different command. NOT published —
  # reachable only on the compose network, fronted by the `web` BFF below. Started
  # with `--profile admin`. See ADR 0002. Alternative for a single-operator setup
  # that would rather not run this as its own service: set `admin_enabled=True` in
  # the `api`/`discord` entrypoint's apply_deployment_config() and drop this
  # service — the chat process serves /admin/v1/* itself (see the ADR addendum).
  admin-api:
    build:
      context: .
      args:
        EXTRAS: ${EXTRAS:-}
    image: magi-app:local
    container_name: magi-admin-api
    restart: unless-stopped
    command: ["python", "main_admin_docker.py"]
    profiles: ["admin"]
    expose:
      - "8100"                    # compose-network only; no host `ports:` mapping
    env_file:
      - .env                      # ADMIN_AUTH_TOKEN, QDRANT_API_KEY, …
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data          # same memory tree as the chat app

  # Next.js admin UI + BFF (web/). The ONLY externally reachable admin surface:
  # holds ADMIN_AUTH_TOKEN server-side, gates the operator with a password →
  # httpOnly cookie, and proxies to admin-api over the compose network. Published.
  web:
    build:
      context: ./web
      secrets:
        # The BFF depends on @carneirofc/ui (GitHub Packages) — the build needs a
        # read:packages token. Export NODE_AUTH_TOKEN before `up --build`; it is
        # passed as a build secret so it never lands in an image layer. See
        # web/README.md "Installing @carneirofc/ui".
        - node_auth_token
    image: magi-admin-web:local
    container_name: magi-admin-web
    restart: unless-stopped
    profiles: ["admin"]
    ports:
      - "3000:3000"
    environment:
      # The admin-api, by its compose service name (internal network).
      ADMIN_API_URL: "http://admin-api:8100"
    env_file:
      - .env                      # ADMIN_AUTH_TOKEN (== admin-api's), ADMIN_PASSWORD, SESSION_SECRET
    depends_on:
      - admin-api

  # Discord bot (main_discord_docker.py). Outbound-only, so no ports. Started only
  # with `--profile discord` so it stays out of the way until you set a bot token.
  discord:
    build:
      context: .
      args:
        EXTRAS: ${EXTRAS:-}
    image: magi-app:local
    container_name: magi-discord
    restart: unless-stopped
    command: ["python", "main_discord_docker.py"]
    profiles: ["discord"]
    env_file:
      - .env                      # must include DISCORD_BOT_TOKEN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data

# Build secret for the `web` image: the read:packages token used to install
# @carneirofc/ui. Sourced from the NODE_AUTH_TOKEN env var at build time.
secrets:
  node_auth_token:
    environment: NODE_AUTH_TOKEN
