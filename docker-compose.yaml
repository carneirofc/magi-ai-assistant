services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.87.0
    container_name: chatbot-litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
      DATABRICKS_API_BASE: ${DATABRICKS_API_BASE:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:-litellm}@postgres:5432/${POSTGRES_DB:-litellm}
      LITELLM_CONTROL_PLANE_URL: ${LITELLM_CONTROL_PLANE_URL:-http://localhost:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-dev-key}
      LITELLM_PROXY_BASE_URL: ${LITELLM_PROXY_BASE_URL:-http://localhost:4000}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT: ${MICROSOFT_TENANT:-}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-litellm-logs}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      LLAMACPP_API_BASE: ${LLAMACPP_API_BASE:-http://host.docker.internal:8080/v1}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      QDRANT_API_BASE: ${QDRANT_API_BASE:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    command:
     - "--config=/app/config.yaml"
     - "--port=4000"

  postgres:
    image: postgres:17-alpine
    container_name: chatbot-litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB:-litellm}
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

  # RustFS — S3-compatible object storage. Backs the chatbot's durable file/image
  # archive (core/storage + agent/tools/storage, gated by config.s3_enabled). Holds
  # the canonical S3 ports 9000 (API) / 9001 (console) on the host so the chatbot's
  # default endpoint (http://localhost:9000) just works. Default creds rustfsadmin
  # /rustfsadmin — override with S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY in .env.
  rustfs:
    image: rustfs/rustfs:latest
    container_name: chatbot-rustfs
    restart: unless-stopped
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot bucket creation for the chatbot archive (mc speaks S3 to any backend).
  rustfs-init:
    image: minio/mc:latest
    container_name: chatbot-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set rustfs http://rustfs:9000 $${S3_ACCESS_KEY_ID:-rustfsadmin} $${S3_SECRET_ACCESS_KEY:-rustfsadmin} &&
      mc mb --ignore-existing rustfs/$${S3_BUCKET:-chatbot-memory} &&
      exit 0
      "
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
      S3_BUCKET: ${S3_BUCKET:-chatbot-memory}

  # MinIO — separate object store dedicated to LiteLLM's logs (litellm reaches it
  # by the internal name minio:9000, unaffected by host ports). Host ports moved to
  # 9100/9101 so RustFS can own the canonical 9000/9001 for the chatbot archive.
  minio:
    image: minio/minio:latest
    container_name: chatbot-minio
    restart: unless-stopped
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: chatbot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET_NAME:-litellm-logs} &&
      exit 0
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-litellm-logs}

  prometheus:
    image: prom/prometheus
    container_name: chatbot-prometheus
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"

volumes:
  postgres_data:
  qdrant_storage:
  minio_data:
  rustfs_data:
  prometheus_data:
