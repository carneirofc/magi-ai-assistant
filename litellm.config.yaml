model_list:
  - model_name: databricks-claude-sonnet-4-6
    litellm_params:
      model: databricks/databricks-claude-sonnet-4-6
      api_key: os.environ/DATABRICKS_TOKEN
      api_base: os.environ/DATABRICKS_API_BASE
  # llama.cpp llama-server, OpenAI-compatible. One model per instance; context
  # size is fixed at launch (--ctx-size), so there is no per-request num_ctx.
  # llama.cpp-native sampling params (top_k, min_p, ...) pass through the body.
  - model_name: qwen3.5-9b-llamacpp
    litellm_params:
      model: openai/qwen3.5-9b
      api_base: os.environ/LLAMACPP_API_BASE
      api_key: dummy # llama-server enforces none unless launched with --api-key
  # --- Ollama entries below are dormant (Ollama retired in favor of
  # llama-server) — kept as a future fallback; they only matter when called. ---
  # Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-Q6_K:latest
  - model_name: qwen3.5-9b-uncensored
    litellm_params:
      model: ollama/qwen3.5-9B-Uncensored-HauhauCS-Aggressive-Q6_K:latest
      api_base: os.environ/OLLAMA_HOST
  - model_name: gemma4:e4b
    litellm_params:
      model: ollama/gemma4:e4b
      api_base: os.environ/OLLAMA_HOST
  - model_name: second_constantine/gpt-oss-u:20b
    litellm_params:
      model: ollama/second_constantine/gpt-oss-u:20b
      api_base: os.environ/OLLAMA_HOST
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: os.environ/OLLAMA_HOST
  - model_name: qwen3-embedding:4b
    litellm_params:
      model: ollama/qwen3-embedding:4b
      api_base: os.environ/OLLAMA_HOST

search_tools:
  - search_tool_name: duckduckgo-search
    litellm_params:
      search_provider: duckduckgo

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  prometheus_authenticate_metrics_endpoint: false
  database_url: os.environ/DATABASE_URL
  proxy_base_url: os.environ/LITELLM_PROXY_BASE_URL
  proxy_batch_write_at: 60 # Batch write spend updates every 60s
  database_connection_pool_limit: 10 # connection pool limit per worker process. Total connections = limit × workers × instances. Calculate: MAX_DB_CONNECTIONS / (instances × workers). Default: 10.

litellm_settings:
  drop_params: true
  ssl_verify: false # 👈 KEY CHANGE
  callbacks: ["prometheus"]

  # We disable this for now.... avoid potential issues with qdrant connection and embedding generation. We can re-enable later when we have more robust error handling and retry logic in place.
