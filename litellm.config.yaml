model_list:
  - model_name: claude-sonnet-4-5-20250929
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: gemma4:e4b
    litellm_params:
      model: ollama/gemma4:e4b
      api_base: os.environ/OLLAMA_HOST
  - model_name: second_constantine/gpt-oss-u:20b
    litellm_params:
      model: ollama/second_constantine/gpt-oss-u:20b
      api_base: os.environ/OLLAMA_HOST

litellm_settings:
  cache: true
  cache_params:
    type: qdrant-semantic
    host: qdrant
    port: 6333
    qdrant_semantic_cache_embedding_model: ollama/nomic-embed-text
    qdrant_collection_name: litellm_semantic_cache
    similarity_threshold: "0.8"
  success_callback:
    - s3
  s3_callback_params:
    s3_bucket_name: os.environ/MINIO_BUCKET_NAME
    s3_region_name: us-east-1
    s3_aws_access_key_id: os.environ/MINIO_ROOT_USER
    s3_aws_secret_access_key: os.environ/MINIO_ROOT_PASSWORD
    s3_endpoint_url: http://minio:9000

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
