[project]
name = "chatbot"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "agno>=2.6.11",
    "anthropic>=0.105.2",
    "ddgs>=9.14.4",
    "discord.py>=2.4.0",
    "docker>=7.1.0",
    "fastapi>=0.136.3",
    "litellm>=1.87.0",
    "ollama>=0.6.2",
    "openai>=2.40.0",
    "python-dotenv>=1.2.2",
    "sqlalchemy>=2.0.50",
    "uvicorn[standard]>=0.48.0",
]

[project.optional-dependencies]
# Semantic memory search (SEMANTIC_MEMORY=1). Optional: core.memory.semantic
# lazy-imports qdrant_client and no-ops when it's absent, so the base install
# stays lean. Enable with: uv sync --extra semantic
semantic = [
    "qdrant-client>=1.12.0",
]
# Seanime-over-MCP (seanime_use_mcp=True). Optional: agent.tools.seanime_mcp
# lazy-imports agno's MCPTools (which needs `mcp`) and only the MCP-backed anime
# specialist touches it, so the base install stays lean. Enable with:
# uv sync --extra mcp
mcp = [
    "mcp>=1.9.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra"
